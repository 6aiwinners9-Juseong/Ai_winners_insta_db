        // 렌더링 함수
        function renderCards(filter = 'all', searchQuery = '') {
            const grid = document.getElementById('card-grid');
            grid.innerHTML = '';
            
            let filteredDb = db;

            // 필터 적용
            if (filter !== 'all') {
                filteredDb = filteredDb.filter(item => item.tag === filter);
            }

            // 검색어 적용
            if (searchQuery) {
                const lower = searchQuery.toLowerCase();
                filteredDb = filteredDb.filter(item => 
                    item.name.toLowerCase().includes(lower) || 
                    item.sub.toLowerCase().includes(lower) || 
                    item.why.toLowerCase().includes(lower) ||
                    item.apply.toLowerCase().includes(lower)
                );
            }

            const noResult = document.getElementById('no-results');
            if (filteredDb.length === 0) {
                noResult.classList.remove('hidden');

                noResult.classList.remove('flex');

                        </div>
                    </div>
                    <div class="p-4 border-t border-slate-700/50 bg-slate-900/30 flex gap-2">
                        <button onclick="openAiModal('${item.name}', 'analysis-${index}', 'action-${index}')" class="flex-1 py-2.5 rounded-lg bg-gradient-to-r from-trend-teal to-blue-600 hover:from-teal-400 hover:to-blue-500 text-white text-xs font-bold flex items-center justify-center gap-1.5 transition-all shadow-lg shadow-teal-900/20">
                            <i class="fa-solid fa-wand-magic-sparkles"></i> AI 확장
                        </button>
                        <a href="${item.link}" target="_blank" class="px-4 py-2.5 rounded-lg ${btnClass} text-xs font-bold transition-colors flex items-center justify-center">
                            ${btnIcon}
                        </a>
                    </div>
                </div>`;
                grid.innerHTML += cardHTML;
            });
            
            // 헤더 정보 업데이트
            document.getElementById('total-count').innerText = db.length;
            const totalNewCount = db.filter(item => item.new).length;
            document.getElementById('new-count-display').innerText = totalNewCount;
            document.getElementById('update-date').innerText = LAST_UPDATE_DATE;
        }

        // 초기 렌더링
        renderCards();

        // 검색 이벤트 리스너
        document.getElementById('search-input').addEventListener('input', (e) => {
            const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;
            renderCards(activeFilter, e.target.value);
        });
        
        // API Key 관리 UI
        window.addEventListener('load', () => {
            const savedKey = localStorage.getItem('gemini_api_key');
            updateApiUi(savedKey);
        });

        function updateApiUi(localKey) {
            const container = document.getElementById('api-key-section');
            if (HOST_API_KEY && HOST_API_KEY.length > 10) {
                container.innerHTML = `
                    <div class="flex items-center justify-between text-trend-teal">
                        <div class="flex items-center gap-2">
                            <i class="fa-solid fa-server"></i>
                            <span class="text-xs font-bold">Host Key Active</span>
                        </div>
                        <span class="text-[10px] bg-trend-teal/20 px-2 py-0.5 rounded text-trend-teal border border-trend-teal/30">Free Mode</span>
                    </div>
                `;
                return;
            }
            const inputValue = localKey || "";
            container.innerHTML = `
                <label class="block text-[10px] font-bold text-trend-teal mb-2 uppercase tracking-wider flex justify-between items-center">
                    <span>Google Gemini API Key</span>
                    <a href="https://aistudio.google.com/app/apikey" target="_blank" class="text-slate-500 hover:text-white underline cursor-pointer text-[10px]">발급받기 ↗</a>
                </label>
                <div class="relative">
                    <input type="password" id="api-key-input" value="${inputValue}" placeholder="API Key 입력 (브라우저에 저장됨)" class="w-full bg-slate-900 border border-slate-700 rounded-lg py-2 px-3 text-white text-xs focus:outline-none focus:border-trend-teal transition-colors">
                    <i class="fa-solid fa-key absolute right-3 top-2.5 text-slate-600 text-xs"></i>
                </div>
            `;
            const input = document.getElementById('api-key-input');
            if(input) {
                input.addEventListener('input', (e) => {
                    localStorage.setItem('gemini_api_key', e.target.value.trim());
                });
            }
        }

        function filterCards(category) {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                if(btn.dataset.filter === category) {
                    btn.className = "filter-btn active px-4 py-2 rounded-full text-xs font-bold bg-white text-slate-900 ring-2 ring-white/20 transition-all shadow-[0_0_15px_rgba(255,255,255,0.2)]";
                } else {
                    btn.className = "filter-btn px-4 py-2 rounded-full text-xs font-bold bg-slate-800 text-slate-400 border border-slate-700 hover:bg-slate-700 hover:text-white transition-all";
                }
            });
            const searchValue = document.getElementById('search-input').value;
            renderCards(category, searchValue);
        }

        let currentContext = {};

        function openAiModal(title, analysisId, actionId) {
            currentContext = { 
                title, 
                analysis: document.getElementById(analysisId).innerText, 
                action: document.getElementById(actionId).innerText 
            };
            
            document.getElementById('modal-context-title').innerText = title;
            document.getElementById('modal-context-text').innerText = `"${currentContext.analysis}"`;
            document.getElementById('modal-action-text').innerText = `👉 ${currentContext.action}`;
            
            document.getElementById('user-prompt-input').value = '';
            document.getElementById('ai-response-area').classList.add('hidden');
            document.getElementById('ai-modal').classList.remove('hidden');
            
            // 모달 애니메이션
            const modalContent = document.querySelector('#ai-modal > div');
            modalContent.classList.remove('opacity-0', 'scale-95');
            modalContent.classList.add('opacity-100', 'scale-100');
            
            document.getElementById('user-prompt-input').focus();
        }

        function closeAiModal() {
            document.getElementById('ai-modal').classList.add('hidden');
        }

        document.getElementById('ai-modal').addEventListener('click', function(e) {
            if (e.target === this) closeAiModal();
        });

        async function generateIdea() {
            let apiKey = HOST_API_KEY;
            
            // API 키 확인
            if (!apiKey || apiKey.length < 30) {
                const inputEl = document.getElementById('api-key-input');
                apiKey = inputEl ? inputEl.value.trim() : localStorage.getItem('gemini_api_key');
            }
            
            const userQuery = document.getElementById('user-prompt-input').value.trim();
            
            if (!apiKey || apiKey.length < 30) return alert("유효한 Google Gemini API Key를 입력해주세요.");
            if (!userQuery) return alert("주제를 입력해주세요!");

            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');
            const outputArea = document.getElementById('ai-response-area');
            const markdownOutput = document.getElementById('markdown-output');

            btnText.textContent = "";
            btnLoader.classList.remove('hidden');
            outputArea.classList.add('hidden');

            const systemPrompt = `
                당신은 크리에이티브 영상 PD 보조 AI입니다.
                
                [레퍼런스] ${currentContext.title}
                - 분석: ${currentContext.analysis}
                - 적용점: ${currentContext.action}

                [사용자 주제] ${userQuery}

                위 레퍼런스 기법을 사용하여 주제에 맞는 영상 기획을 제안하세요.
                1. 💡 기획 컨셉 (한 줄)
                2. 🎬 연출/촬영 가이드
                3. 📝 오프닝 멘트
                4. 🎨 AI 이미지 프롬프트 (Nano Banana Pro / Midjourney v7 최적화)
            `;

            const payload = {
                contents: [{ parts: [{ text: userQuery }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            // 네트워크 재시도 및 API 에러 상태 처리 함수
            const fetchWithBackoff = async (url, options, maxRetries = 2) => {
                const delays = [1000, 2000];
                for (let i = 0; i <= maxRetries; i++) {
                    try {
                        const response = await fetch(url, options);
                        const result = await response.json().catch(() => ({}));
                        
                        if (!response.ok) {
                            // 404: 해당 Gemini 버전이 더 이상 존재하지 않거나 지원 중단됨
                            if (response.status === 404) throw new Error("MODEL_NOT_FOUND");
                            
                            const errorMessage = result.error?.message || `HTTP 오류 ${response.status}`;
                            if (response.status === 400) throw new Error(`잘못된 요청: ${errorMessage}`);
                            if (response.status === 403) throw new Error(`권한 거부(API 키 확인): ${errorMessage}`);
                            
                            // 429(너무 많은 요청) 또는 500대 서버 에러면 재시도
                            if ((response.status === 429 || response.status >= 500) && i < maxRetries) {
                                // wait and retry
                            } else {
                                throw new Error(errorMessage);
                            }
                        } else {
                            return result;
                        }
                    } catch (error) {
                        // 모델 버전을 찾을 수 없거나 권한 관련 문제면 재시도 없이 즉각 에러 던짐
                        if (error.message === "MODEL_NOT_FOUND" || error.message.includes("권한") || error.message.includes("잘못된 요청")) {
                            throw error;
                        }
                        if (i === maxRetries) throw error;
                    }
                    if (i < maxRetries) await new Promise(res => setTimeout(res, delays[i]));
                }
            };

            // 사용 가능한 Gemini 모델 버전 후보군 (최신/안정화 버전 순서로 폴백)
            const modelsToTry = [
                'gemini-2.5-flash',                 // 1순위: 최신 2.5 플래시 정식 모델
                'gemini-2.5-flash-preview-09-2025', // 2순위: 2.5 플래시 프리뷰 (일부 환경 호환성)
                'gemini-2.0-flash',                 // 3순위: 2.0 안정화 버전
                'gemini-1.5-flash'                  // 4순위: 구형 호환 버전
            ];

            let data = null;
            let finalError = null;

            try {
                // 모델 버전을 순회하며 작동하는 버전 찾기
                for (const model of modelsToTry) {
                    try {
                        const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
                        data = await fetchWithBackoff(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        break; // 성공적으로 응답을 받으면 루프 종료
                    } catch (err) {
                        finalError = err;
                        if (err.message === "MODEL_NOT_FOUND") {
                            console.warn(`[버전 안내] ${model} 버전을 사용할 수 없어 다음 버전으로 시도합니다.`);
                            continue; // 다음 모델로 재시도
                        }
                        throw err; // 권한 문제 등 다른 치명적 에러면 즉시 중단
                    }
                }

                // 모든 버전을 시도했는데도 data가 없으면 실패
                if (!data) {
                    throw new Error(finalError?.message === "MODEL_NOT_FOUND" 
                        ? "호환되는 Gemini API 버전을 찾을 수 없습니다. (2.5, 2.0, 1.5 모두 실패)" 
                        : finalError?.message || "서버 통신 중 알 수 없는 오류가 발생했습니다.");
                }

                // 안전 필터(Safety Ratings) 차단 유효성 검사
                if (data.promptFeedback && data.promptFeedback.blockReason) {
                    throw new Error(`안전 정책에 의해 차단되었습니다. (사유: ${data.promptFeedback.blockReason})`);
                }
                if (!data.candidates || data.candidates.length === 0) {
                    throw new Error("AI 응답 데이터가 생성되지 않았습니다.");
                }

                const candidate = data.candidates[0];
                if (candidate.finishReason === 'SAFETY') {
                    throw new Error("생성된 결과물이 구글 안전 필터에 의해 차단되었습니다.");
                }

                const text = candidate.content?.parts?.[0]?.text;
                if (!text) {
                    throw new Error("유효한 텍스트 응답을 받지 못했습니다.");
                }

                markdownOutput.innerHTML = marked.parse(text);
                outputArea.classList.remove('hidden');
            } catch (error) {
                console.error("AI Generation Error:", error);
                markdownOutput.innerHTML = `<p class="text-red-400 font-bold">⚠️ 오류 발생</p><p class="text-slate-400 text-xs mt-1 break-words">${error.message}</p>`;
                outputArea.classList.remove('hidden');
            } finally {
                btnText.textContent = "생성";
                btnLoader.classList.add('hidden');
            }
        }

        document.getElementById('user-prompt-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') generateIdea();
        });
    </script>
</body>
</html>
